version: '3.8'

services:
  web:
    build: .
    environment:
      - DB_HOST=db
      - DB_NAME=isxengines_db
      - DB_USER=isxengines_user
      - DB_PASS=ISXEngines2026!
      - SITE_URL=https://isxengines.com
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/var/www/html/assets/uploads
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ISXRoot2026!
      MYSQL_DATABASE: isxengines_db
      MYSQL_USER: isxengines_user
      MYSQL_PASSWORD: ISXEngines2026!
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql-data:
  uploads:
